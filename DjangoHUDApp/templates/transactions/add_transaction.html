{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-1">Log New Savings</h3>
                    <p class="text-muted small mb-4">Keep your streak alive by logging your daily 1k.</p>

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Amount (UGX)</label>
                            {{ form.amount }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mobile Money Reference</label>
                            {{ form.transaction_id }}
                            <div class="form-text fs-11px">Paste the TXN ID from your MM message.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Notes</label>
                            {{ form.reference }}
                        </div>

                        <button type="submit" class="btn btn-theme w-100 rounded-pill py-2 fw-bold">
                            SUBMIT DEPOSIT
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
